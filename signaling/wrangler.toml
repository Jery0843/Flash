name = "blitz-signaling"
main = "src/index.js"
compatibility_date = "2026-05-23"

# Durable Object bindings
[durable_objects]
bindings = [
  { name = "SIGNALING_ROOM", class_name = "SignalingRoom" }
]

# Durable Object migrations
[[migrations]]
tag = "v1"
new_classes = ["SignalingRoom"]

# Environment variables (set via wrangler secret or dashboard)
# [vars]
# Cloudflare TURN credentials (set via wrangler secret)
# Use `wrangler secret put TURN_KEY_ID` for the TURN key ID
# Use `wrangler secret put TURN_SECRET` for the TURN secret
